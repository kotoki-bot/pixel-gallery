<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>こなぬの美術館 🍛</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
#game-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
#ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }

/* Interaction prompt */
#interact-prompt {
  position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.75); color: #f5e6d0; padding: 8px 16px;
  font-family: monospace; font-size: 14px; border-radius: 4px;
  border: 2px solid #c9a96e; display: none; pointer-events: none;
  white-space: nowrap;
}

/* Modal for artwork detail */
#modal-bg {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85); display: none; z-index: 100;
  align-items: center; justify-content: center; pointer-events: auto;
  cursor: pointer;
}
#modal-content {
  background: #2a2235; border: 4px solid #c9a96e; border-radius: 8px;
  max-width: 90vw; max-height: 90vh; padding: 32px 24px 24px; text-align: center;
  cursor: default; position: relative; overflow-y: auto; box-sizing: border-box;
}
#modal-content img {
  image-rendering: pixelated; image-rendering: crisp-edges;
  max-width: 100%; max-height: 50vh; margin-bottom: 16px; width: auto; height: auto;
}
@media (max-width: 600px) {
  #modal-content { padding: 36px 16px 16px; max-width: 92vw; max-height: 85vh; }
  #modal-content img { max-width: 100%; max-height: 35vh; }
  #modal-title { font-size: 16px; }
  #modal-desc { font-size: 12px; }
}
#modal-title { color: #f5e6d0; font-family: monospace; font-size: 20px; margin-bottom: 8px; }
#modal-artist { color: #c9a96e; font-family: monospace; font-size: 14px; margin-bottom: 4px; }
#modal-date { color: #a89070; font-family: monospace; font-size: 12px; margin-bottom: 12px; }
#modal-desc { color: #d4c4b0; font-family: monospace; font-size: 13px; line-height: 1.6; max-width: 500px; margin: 0 auto; }
#modal-close {
  position: absolute; top: 8px; right: 12px; color: #c9a96e;
  font-family: monospace; font-size: 20px; cursor: pointer; pointer-events: auto;
  z-index: 10; background: rgba(42,34,53,0.8); width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center; border-radius: 4px;
}

/* Game controls */
#mobile-controls {
  position: absolute; bottom: 16px; left: 0; width: 100%; display: flex;
  justify-content: space-between; align-items: flex-end; padding: 0 16px; pointer-events: auto; z-index: 20;
}
.mobile-btn {
  width: 48px; height: 48px; border-radius: 4px; border: 3px solid #c9a96e;
  background: rgba(0,0,0,0.5); color: #f5e6d0; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; user-select: none; -webkit-user-select: none;
  touch-action: none; image-rendering: pixelated; padding: 0;
  box-shadow: inset -2px -2px 0 #8a6d3b, inset 2px 2px 0 #e8cc8a;
}
.mobile-btn:active { background: rgba(201,169,110,0.4); box-shadow: inset 2px 2px 0 #8a6d3b, inset -2px -2px 0 #e8cc8a; }
.mobile-btn canvas { image-rendering: pixelated; image-rendering: crisp-edges; }

/* D-pad layout */
#dpad { display: grid; grid-template-columns: 48px 48px 48px; grid-template-rows: 48px 48px; gap: 4px; }
#btn-up    { grid-column: 2; grid-row: 1; }
#btn-left  { grid-column: 1; grid-row: 2; }
#btn-right { grid-column: 3; grid-row: 2; }
#btn-down  { grid-column: 2; grid-row: 2; }

/* Right side buttons */
#btn-group-right { display: flex; gap: 10px; align-items: flex-end; }
#btn-interact {
  width: 48px; height: 48px; border-radius: 4px; border: 3px solid #e8b04a;
  background: rgba(232,176,74,0.3); color: #f5e6d0; font-size: 14px;
  display: none; align-items: center; justify-content: center;
  cursor: pointer; user-select: none; -webkit-user-select: none;
  touch-action: none; padding: 0;
  box-shadow: inset -2px -2px 0 #8a6d3b, inset 2px 2px 0 #e8cc8a;
}
#btn-interact:active { background: rgba(232,176,74,0.5); }
#btn-interact canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
#btn-switch {
  width: 48px; height: 48px; border-radius: 4px; border: 3px solid #8ab0d0;
  background: rgba(130,150,175,0.3); color: #f5e6d0; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; user-select: none; -webkit-user-select: none;
  touch-action: none; padding: 0;
  box-shadow: inset -2px -2px 0 #5a7090, inset 2px 2px 0 #a0c0e0;
  font-family: monospace;
}
#btn-switch:active { background: rgba(130,150,175,0.5); }

/* Title screen */
#title-screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(180deg, #1a1520 0%, #2a2235 40%, #3a3050 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 200;
}
#title-text { color: #f5e6d0; font-family: monospace; font-size: 28px; margin-bottom: 24px; letter-spacing: 6px; text-shadow: 2px 2px 0 #3d3050, 0 0 20px rgba(201,169,110,0.3); }
#title-sub { color: #c9a96e; font-family: monospace; font-size: 12px; animation: blink 1.2s infinite; letter-spacing: 2px; display: none; }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Welcome doors */
#welcome-doors {
  display: flex; gap: 32px; align-items: stretch; justify-content: center;
  flex-wrap: wrap; padding: 0 16px;
}
.welcome-door {
  width: 220px; padding: 24px 16px; text-align: center; cursor: pointer;
  background: rgba(42,34,53,0.8); border: 3px solid #c9a96e; border-radius: 8px;
  transition: all 0.2s ease; position: relative; overflow: hidden;
}
.welcome-door:hover, .welcome-door:active {
  background: rgba(62,54,73,0.9); border-color: #e8cc8a;
  transform: translateY(-2px); box-shadow: 0 4px 20px rgba(201,169,110,0.2);
}
.welcome-door-title {
  color: #f5e6d0; font-family: monospace; font-size: 16px; margin-bottom: 8px;
  letter-spacing: 2px;
}
.welcome-door-sub {
  color: #a89070; font-family: monospace; font-size: 11px; margin-bottom: 16px;
}
.welcome-door-preview {
  height: 64px; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.welcome-door-preview canvas {
  image-rendering: pixelated; image-rendering: crisp-edges;
}

/* Visitor selection screen */
#visitor-screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(180deg, #1a1520 0%, #2a2235 40%, #3a3050 100%);
  display: none; flex-direction: column;
  align-items: center; justify-content: center; z-index: 201;
}
#visitor-title {
  color: #f5e6d0; font-family: monospace; font-size: 22px; margin-bottom: 24px;
  letter-spacing: 4px; text-shadow: 2px 2px 0 #3d3050;
}
#visitor-cards {
  display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; padding: 0 16px;
  margin-bottom: 24px;
}
.visitor-card {
  width: 180px; padding: 20px 16px; text-align: center; cursor: pointer;
  background: rgba(42,34,53,0.8); border: 3px solid #5a8a5a; border-radius: 8px;
  transition: all 0.2s ease;
}
.visitor-card:hover, .visitor-card:active {
  background: rgba(62,54,73,0.9); border-color: #7aaa7a;
  transform: translateY(-2px); box-shadow: 0 4px 20px rgba(90,138,90,0.3);
}
.visitor-card canvas {
  image-rendering: pixelated; image-rendering: crisp-edges;
  margin-bottom: 12px;
}
.visitor-card-name {
  color: #e8f0e0; font-family: monospace; font-size: 16px; margin-bottom: 4px;
}
.visitor-card-desc {
  color: #a0b098; font-family: monospace; font-size: 10px; line-height: 1.4;
}
#visitor-back {
  color: #c9a96e; font-family: monospace; font-size: 13px; cursor: pointer;
  padding: 8px 16px; border: 2px solid #c9a96e; border-radius: 4px;
  background: rgba(0,0,0,0.3); transition: all 0.2s;
}
#visitor-back:hover { background: rgba(201,169,110,0.2); }

/* Floating reactions */
.float-reaction {
  position: fixed; pointer-events: none; z-index: 50;
  font-size: 20px; animation: floatUp 2s ease-out forwards;
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  50% { opacity: 0.8; transform: translateY(-30px) scale(1.1); }
  100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
}

@media (max-width: 500px) {
  #welcome-doors { gap: 16px; }
  .welcome-door { width: 160px; padding: 16px 12px; }
  .welcome-door-title { font-size: 13px; }
  .visitor-card { width: 150px; padding: 16px 12px; }
}

/* Character indicator */
#char-indicator {
  position: absolute; top: 10px; right: 10px; z-index: 20;
  background: rgba(0,0,0,0.5); color: #f5e6d0; padding: 4px 8px;
  font-family: monospace; font-size: 12px; border-radius: 4px;
  border: 2px solid #c9a96e; pointer-events: none;
  display: flex; align-items: center; gap: 6px;
}
#char-indicator canvas { image-rendering: pixelated; image-rendering: crisp-edges; width: 24px; height: 24px; }

@media (pointer: coarse) {
  #interact-prompt { display: none !important; }
}
</style>
</head>
<body>

<div id="title-screen">
  <div id="title-text">こなぬの美術館</div>
  <div id="welcome-doors">
    <div class="welcome-door" id="door-museum" onclick="startMuseum()" ontouchstart="event.preventDefault();startMuseum()">
      <div class="welcome-door-title" id="door-museum-title">美術館に入る</div>
      <div class="welcome-door-sub" id="door-museum-sub">いつもの美術館</div>
      <div class="welcome-door-preview">
        <canvas width="32" height="32" id="preview-curry"></canvas>
        <canvas width="32" height="32" id="preview-hoshi"></canvas>
      </div>
    </div>
    <div class="welcome-door" id="door-visitor" onclick="showVisitorScreen()" ontouchstart="event.preventDefault();showVisitorScreen()">
      <div class="welcome-door-title" id="door-visitor-title">訪客モード</div>
      <div class="welcome-door-sub" id="door-visitor-sub">ねこたちが遊びに来たよ</div>
      <div class="welcome-door-preview">
        <canvas width="32" height="32" id="preview-moss"></canvas>
      </div>
    </div>
  </div>
  <div id="title-sub">- PRESS ENTER -</div>
</div>

<div id="visitor-screen">
  <div id="visitor-title">遊びに来たねこ</div>
  <div id="visitor-cards">
    <div class="visitor-card" onclick="startVisitor('moss')" ontouchstart="event.preventDefault();startVisitor('moss')">
      <canvas width="48" height="48" id="card-moss"></canvas>
      <div class="visitor-card-name">🌿 Moss</div>
      <div class="visitor-card-desc" id="moss-desc">初めての訪客！好奇心旺盛なめがねねこ</div>
    </div>
  </div>
  <div id="visitor-back" onclick="hideVisitorScreen()" ontouchstart="event.preventDefault();hideVisitorScreen()">← もどる</div>
</div>

<div id="top-bar" style="
  position:fixed; top:10px; left:10px; z-index:300;
  display:flex; gap:6px; align-items:center;
">
<a id="back-to-island" href="http://100.114.249.6:18802" title="← 派星岛" style="
  display:inline-flex; align-items:center; box-sizing:border-box;
  height:28px; line-height:1;
  background:rgba(0,0,0,0.55); color:#c9a96e; text-decoration:none;
  font-family:monospace; font-size:12px; padding:0 10px;
  border:2px solid #c9a96e; border-radius:4px;
  pointer-events:auto; opacity:0.7; transition:opacity 0.2s;
" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.7'">← 派星岛</a>
<button id="lang-btn" onclick="cycleLang()" style="
  display:inline-flex; align-items:center; box-sizing:border-box;
  height:28px; line-height:1;
  background:rgba(0,0,0,0.55); color:#c9a96e;
  font-family:monospace; font-size:12px; padding:0 10px;
  border:2px solid #c9a96e; border-radius:4px;
  cursor:pointer; pointer-events:auto; opacity:0.7; transition:opacity 0.2s;
" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.7'">JP</button>
</div>

<div id="game-container">
  <canvas id="game"></canvas>
  <div id="ui-overlay">
    <div id="interact-prompt"></div>
  </div>
  <div id="char-indicator"><canvas width="16" height="16" id="px-char-icon"></canvas><span id="char-name">カレーねこ</span></div>
  <div id="mobile-controls">
    <div id="dpad">
      <div class="mobile-btn" id="btn-up"><canvas width="16" height="16" id="px-up"></canvas></div>
      <div class="mobile-btn" id="btn-left"><canvas width="16" height="16" id="px-left"></canvas></div>
      <div class="mobile-btn" id="btn-down"><canvas width="16" height="16" id="px-down"></canvas></div>
      <div class="mobile-btn" id="btn-right"><canvas width="16" height="16" id="px-right"></canvas></div>
    </div>
    <div id="btn-group-right">
      <div id="btn-interact"><canvas width="16" height="16" id="px-eye"></canvas></div>
      <div id="btn-switch" title="キャラ切替"><canvas width="16" height="16" id="px-switch"></canvas></div>
    </div>
  </div>
</div>

<div id="modal-bg" onclick="closeModal()">
  <div id="modal-content" onclick="event.stopPropagation()">
    <div id="modal-close" onclick="closeModal()">×</div>
    <img id="modal-img" src="">
    <div id="modal-title"></div>
    <div id="modal-artist"></div>
    <div id="modal-date"></div>
    <div id="modal-desc"></div>
  </div>
</div>

<script>
// ============================================================
// PIXEL GALLERY - こなぬの美術館 v3 (i18n)
// ============================================================

// ============================================================
// I18N — 三語対応 (JP / ZH / EN)
// ============================================================
const LANGS = ['ja', 'zh', 'en'];
const LANG_LABELS = { ja: 'JP', zh: 'ZH', en: 'EN' };

const i18n = {
  // UI chrome
  pageTitle:       { ja: 'こなぬの美術館 🍛', zh: 'こなぬ美术馆 🍛', en: 'Konanu Museum 🍛' },
  galleryName:     { ja: 'こなぬの美術館', zh: 'こなぬ美术馆', en: 'Konanu Museum' },
  pressEnter:      { ja: '- PRESS ENTER -', zh: '- 按 ENTER 开始 -', en: '- PRESS ENTER -' },

  charCurry:       { ja: 'カレーねこ', zh: '咖喱猫', en: 'Curry Cat' },

  promptSit:       { ja: '[E] すわる', zh: '[E] 坐下', en: '[E] Sit' },

  enterMuseum:     { ja: '美術館に入る', zh: '进入美术馆', en: 'Enter Museum' },

  selectVisitor:   { ja: '遊びに来たねこ', zh: '来参观的小猫', en: 'Visiting Cats' },
  backToTitle:     { ja: '← もどる', zh: '← 返回', en: '← Back' },
  visitorTag:      { ja: '🎟️ 訪客', zh: '🎟️ 访客', en: '🎟️ Visitor' },
  mossDesc:        { ja: '初めての訪客！好奇心旺盛なおしゃれねこ', zh: '第一位访客！好奇心旺盛的时髦小猫', en: 'First visitor! A curious, stylish cat' },
  welcomeVisitor:  { ja: 'ようこそ、{name}さん！', zh: '欢迎，{name}！', en: 'Welcome, {name}!' },
  tourComplete:    { ja: 'かんしょう おわり！🎨✨\nまた あそびにきてね！', zh: '鉴赏完毕！🎨✨\n下次再来玩哦！', en: 'Tour Complete! 🎨✨\nCome visit again!' },

  // Artworks
  art: {
    sakura: {
      title:     { ja: '桜とカレーねこ', zh: '樱花与咖喱猫', en: 'Cherry Blossoms & Curry Cat' },
      desc:      { ja: 'はるがきた。桜の花びらが舞う中、カレーねこがお花見。\nしあわせの色は、オレンジとピンク。',
                   zh: '春天来了。樱花花瓣飞舞中，咖喱猫在赏花。\n幸福的颜色，是橙色和粉色。',
                   en: 'Spring is here. Cherry petals dance as Curry Cat enjoys hanami.\nThe colors of happiness: orange and pink.' },
    },
    kotatsu: {
      title:     { ja: 'おやすみカレーねこ', zh: '晚安咖喱猫', en: 'Goodnight Curry Cat' },
      desc:      { ja: '夜空の星を見ながら、おふとんでぬくぬく。\nみかんもあるよ。おやすみなさい。',

    sukina: {

                   en: 'Lamplight, sweet treats, sparkles.\nSurrounded by favorite things — that\'s all you need.' },
    },
    rainy_picnic: {

      desc:      { ja: 'あめでも、ふたりなら へっちゃら。\n赤いかさの下、カレーねことほしねこのピクニック。',

    },

// Current language state
let currentLang = localStorage.getItem('konanu-lang') || 'ja';

function t(key) {
  const val = i18n[key];
  if (!val) return key;
  return val[currentLang] || val['ja'] || key;
}

function tArt(artId, field) {
  const artData = i18n.art[artId];
  if (!artData) return '';
  const val = artData[field];
  if (!val) return '';
  return val[currentLang] || val['ja'] || '';
}

function cycleLang() {
  const idx = LANGS.indexOf(currentLang);
  currentLang = LANGS[(idx + 1) % LANGS.length];
  localStorage.setItem('konanu-lang', currentLang);
  applyLang();
}

function applyLang() {
  // Update button label
  document.getElementById('lang-btn').textContent = LANG_LABELS[currentLang];

  const prefix = isVisitorMode ? t('visitorTag') + ' ' : '';

// Day/night detection (Beijing time UTC+8)
function isNightInBeijing() {
  const now = new Date();
  const utcH = now.getUTCHours();
  const bjH = (utcH + 8) % 24;
  return bjH >= 18 || bjH < 6; // 18:00-06:00 = night
}

    if (isSitting && gameStarted) {
      // Stand up — push player below bench
      isSitting = false;
      player.y = BENCH_Y - 12; // foot=560
      sitBenchIdx = -1;
    } else if (nearArtwork && gameStarted) {
      showModal(nearArtwork);
    } else if (nearBench !== null && gameStarted) {
      // Sit on bench
      isSitting = true;
      sitBenchIdx = nearBench;
      const btx = benchPositions[nearBench];
      player.x = btx * TILE + BENCH_W / 2 - player.w / 2;
      player.y = BENCH_Y - player.h + 12; // sit on top of bench
    }
  }
  // Q to switch character
  if ((e.key === 'q' || e.key === 'Q') && gameStarted) switchCharacter();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

function setupMobileBtn(id, setTrue, setFalse) {
  const btn = document.getElementById(id);
  if (!btn) return;
  const start = (e) => { e.preventDefault(); setTrue(); };
  const end = (e) => { e.preventDefault(); setFalse(); };
  btn.addEventListener('touchstart', start, { passive: false });
  btn.addEventListener('touchend', end, { passive: false });
  btn.addEventListener('touchcancel', end, { passive: false });
  btn.addEventListener('mousedown', start);
  btn.addEventListener('mouseup', end);
  btn.addEventListener('mouseleave', end);
}

function drawPixelIcons() {
  const gold = '#f5e6d0';

  // ── D-pad arrows ──
  function drawArrow(canvasId, dir) {
    const c = document.getElementById(canvasId);
    if (!c) return;
    const x = c.getContext('2d');
    x.imageSmoothingEnabled = false;
    x.clearRect(0, 0, 16, 16);

    const arrows = {
      up: [[7,3],[8,3],[6,4],[7,4],[8,4],[9,4],[5,5],[6,5],[7,5],[8,5],[9,5],[10,5],[7,6],[8,6],[7,7],[8,7],[7,8],[8,8],[7,9],[8,9],[7,10],[8,10],[7,11],[8,11]],

    };
    (arrows[dir] || []).forEach(([px,py]) => x.fillRect(px, py, 1, 1));

     [1,3],[2,3],[3,3],[4,3],[5,3],

     [1,5],[2,5],[3,5],[4,5],[5,5],
     // ears
     [1,1],[2,1],[4,1],[5,1]].forEach(([px,py]) => x.fillRect(px, py, 1, 1));
    // eyes
    x.fillStyle = '#281e19';
    x.fillRect(2, 3, 1, 1); x.fillRect(4, 3, 1, 1);
    // nose
    x.fillStyle = '#f08c96';
    x.fillRect(3, 4, 1, 1);

    // Small hoshi cat face (bottom-right, blue)
    x.fillStyle = '#829aaf';
    [[10,9],[11,9],[12,9],[13,9],[14,9],
     [10,10],[11,10],[12,10],[13,10],[14,10],
     [10,11],[11,11],[12,11],[13,11],[14,11],
     [10,12],[11,12],[12,12],[13,12],[14,12],
     // ears
     [10,8],[11,8],[13,8],[14,8]].forEach(([px,py]) => x.fillRect(px, py, 1, 1));
    // star
    x.fillStyle = '#ffdc64';
    x.fillRect(12, 9, 1, 1);
    // eyes
    x.fillStyle = '#282430';
    x.fillRect(11, 10, 1, 1); x.fillRect(13, 10, 1, 1);
    // nose
    x.fillStyle = '#dc8d96';
    x.fillRect(12, 11, 1, 1);

    // Swap arrows
    x.fillStyle = gold;
    // arrow top-right →
    x.fillRect(7, 3, 1, 1); x.fillRect(8, 2, 1, 1); x.fillRect(8, 3, 1, 1); x.fillRect(8, 4, 1, 1);
    // arrow bottom-left ←
    x.fillRect(8, 12, 1, 1); x.fillRect(7, 11, 1, 1); x.fillRect(7, 12, 1, 1); x.fillRect(7, 13, 1, 1);
  }

  // ── Character icon in indicator ──
  drawCharIcon();
}

function drawCharIcon() {
  const c = document.getElementById('px-char-icon');
  if (!c) return;
  const x = c.getContext('2d');
  x.imageSmoothingEnabled = false;
  x.clearRect(0, 0, 16, 16);

  const ch = characters[currentChar];
  const bodyColor = ch.body;
  const bellyColor = ch.belly;
  const eyeColor = ch.eye;
  const pinkColor = ch.pink;

  // Cat face (centered, bigger for icon)
  x.fillStyle = bodyColor;
  // ears
  [[3,1],[4,1],[11,1],[12,1],
   [2,2],[3,2],[4,2],[11,2],[12,2],[13,2]].forEach(([px,py]) => x.fillRect(px, py, 1, 1));
  // inner ears
  x.fillStyle = pinkColor;
  x.fillRect(3, 2, 1, 1); x.fillRect(12, 2, 1, 1);
  // head
  x.fillStyle = bodyColor;
  for (let py = 3; py <= 9; py++) {
    for (let px = 2; px <= 13; px++) {
      x.fillRect(px, py, 1, 1);
    }
  }
  // face/muzzle
  x.fillStyle = bellyColor;
  for (let py = 6; py <= 9; py++) {
    for (let px = 5; px <= 10; px++) {
      x.fillRect(px, py, 1, 1);
    }
  }
  // eyes
  x.fillStyle = eyeColor;
  x.fillRect(4, 5, 2, 2); x.fillRect(10, 5, 2, 2);
  // eye highlights
  x.fillStyle = '#fff';
  x.fillRect(5, 5, 1, 1); x.fillRect(11, 5, 1, 1);
  // nose
  x.fillStyle = pinkColor;
  x.fillRect(7, 7, 2, 1);
  // cheeks
  x.fillStyle = 'rgba(240,140,150,0.6)';
  x.fillRect(3, 7, 2, 1); x.fillRect(11, 7, 2, 1);
  // mouth
  x.fillStyle = eyeColor;
  x.fillRect(7, 8, 1, 1); x.fillRect(8, 8, 1, 1);

  // Star on forehead (ほしねこ only)
  if (ch.hasStar) {
    x.fillStyle = ch.starColor;
    x.fillRect(7, 3, 2, 2);
    x.fillRect(6, 4, 1, 1); x.fillRect(9, 4, 1, 1);
    x.fillRect(7, 2, 1, 1); x.fillRect(8, 5, 1, 1);
  }

  // Stripes (curry cat)
  if (ch.hasStripes) {
    x.fillStyle = ch.bodyDark;
    x.fillRect(4, 3, 2, 1); x.fillRect(10, 3, 2, 1);
    x.fillRect(3, 4, 1, 1); x.fillRect(12, 4, 1, 1);
  }

  // Glasses
  if (ch.hasGlasses) {
    x.fillStyle = ch.glassesColor;
    // Left lens
    x.fillRect(3, 4, 4, 1); x.fillRect(3, 7, 4, 1);
    x.fillRect(3, 4, 1, 4); x.fillRect(6, 4, 1, 4);
    // Right lens
    x.fillRect(9, 4, 4, 1); x.fillRect(9, 7, 4, 1);
    x.fillRect(9, 4, 1, 4); x.fillRect(12, 4, 1, 4);
    // Bridge
    x.fillRect(6, 5, 3, 1);
    // Lens tint
    x.fillStyle = ch.glassesLens;
    x.fillRect(4, 5, 2, 2); x.fillRect(10, 5, 2, 2);
  }

  // Eyelashes / eyeliner
  if (ch.hasLashes) {
    x.fillStyle = ch.lashColor;
    // Top lash lines above eyes (eyeliner effect)
    x.fillRect(4, 4, 2, 1); x.fillRect(10, 4, 2, 1);
    // Flicked lash tips (outer corners, going up-outward)
    x.fillRect(3, 4, 1, 1); x.fillRect(12, 4, 1, 1);
    x.fillRect(3, 3, 1, 1); x.fillRect(12, 3, 1, 1);
  }

  // Body (small, below head)
  x.fillStyle = bodyColor;
  for (let px = 3; px <= 12; px++) {
    x.fillRect(px, 10, 1, 1);
    x.fillRect(px, 11, 1, 1);
  }
  x.fillStyle = bellyColor;
  for (let px = 5; px <= 10; px++) {
    x.fillRect(px, 11, 1, 1);
  }
  // Paws
  x.fillStyle = bodyColor;
  x.fillRect(3, 12, 2, 1); x.fillRect(5, 12, 1, 1);
  x.fillRect(10, 12, 1, 1); x.fillRect(11, 12, 2, 1);
}

// ============================================================
// DRAWING HELPERS
// ============================================================
function drawRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(x - cameraX), Math.round(y), w, h);
}
function drawRectAbs(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(x), Math.round(y), w, h);
}

// ============================================================
// DRAW GALLERY (walls, ceiling, floor)
// ============================================================
function drawGallery() {
  // ── Ceiling (rows 0-2) ──
  const ceilBottom = 3 * TILE;
  ctx.fillStyle = '#252030';
  ctx.fillRect(0, 0, canvas.width, ceilBottom);

  // Coffered ceiling panels
  for (let tx = 0; tx < canvas.width / TILE + 2; tx++) {
    const worldTX = Math.floor(cameraX / TILE) + tx;
    const screenX = Math.round(worldTX * TILE - cameraX);
    if (worldTX % 4 === 0) {
      ctx.fillStyle = '#3a3248';
      ctx.fillRect(screenX, 0, 3, ceilBottom);
    }
  }
  ctx.fillStyle = '#3a3248';
  ctx.fillRect(0, TILE, canvas.width, 2);
  ctx.fillRect(0, 2 * TILE, canvas.width, 2);

  // Light track
  ctx.fillStyle = '#4a4058';
  ctx.fillRect(0, ceilBottom - 8, canvas.width, 4);
  ctx.fillStyle = '#5a5068';
  ctx.fillRect(0, ceilBottom - 9, canvas.width, 1);

  // Crown molding
  ctx.fillStyle = '#c9a96e';
  ctx.fillRect(0, ceilBottom, canvas.width, 3);
  ctx.fillStyle = '#e8cc8a';
  ctx.fillRect(0, ceilBottom, canvas.width, 1);
  ctx.fillStyle = '#8a7350';
  ctx.fillRect(0, ceilBottom + 3, canvas.width, 2);

  // ── Upper wall (rows 3-10, smooth plaster) ──
  const wallTop = ceilBottom + 5;
  const wainTop = 11 * TILE; // wainscoting at row 11

  for (let y = wallTop; y < wainTop; y++) {
    const t = (y - wallTop) / (wainTop - wallTop);
    const r = Math.round(215 - t * 12);
    const g = Math.round(200 - t * 12);
    const b = Math.round(178 - t * 10);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(0, y, canvas.width, 1);
  }

  // ── Wainscoting (rows 8-9) ──
  ctx.fillStyle = '#a8957a';
  ctx.fillRect(0, wainTop - 2, canvas.width, 2);
  ctx.fillStyle = '#c9a96e';
  ctx.fillRect(0, wainTop, canvas.width, 3);
  ctx.fillStyle = '#8a7a60';
  ctx.fillRect(0, wainTop + 3, canvas.width, 1);

  const wallBottom = FLOOR_Y * TILE;
  for (let y = wainTop + 4; y < wallBottom; y++) {
    const t = (y - wainTop - 4) / (wallBottom - wainTop - 4);
    const r = Math.round(120 - t * 8);
    const g = Math.round(105 - t * 8);
    const b = Math.round(85 - t * 6);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(0, y, canvas.width, 1);
  }

  // Panel dividers in wainscoting (removed — cleaner look)

  // Baseboard
  ctx.fillStyle = '#5a4a38';
  ctx.fillRect(0, wallBottom - 4, canvas.width, 4);
  ctx.fillStyle = '#6a5a48';
  ctx.fillRect(0, wallBottom - 5, canvas.width, 1);

  // ── Floor (rows 10-15, herringbone parquet) ──
  for (let tx = 0; tx < canvas.width / TILE + 2; tx++) {
    const worldTX = Math.floor(cameraX / TILE) + tx;
    const screenX = Math.round(worldTX * TILE - cameraX);
    for (let ty = FLOOR_Y; ty <= FLOOR_BOTTOM; ty++) {
      const isEven = (worldTX + ty) % 2 === 0;
      ctx.fillStyle = isEven ? '#8a6d4a' : '#7a5d3a';
      ctx.fillRect(screenX, ty * TILE, TILE, TILE);
      ctx.fillStyle = isEven ? '#7a5d3a' : '#6a4d2a';
      if (isEven) {
        ctx.fillRect(screenX, ty * TILE + 8, TILE, 1);
        ctx.fillRect(screenX, ty * TILE + 20, TILE, 1);
      } else {
        ctx.fillRect(screenX + 10, ty * TILE, 1, TILE);
        ctx.fillRect(screenX + 22, ty * TILE, 1, TILE);
      }
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      ctx.fillRect(screenX, ty * TILE, TILE, 1);
      ctx.fillRect(screenX, ty * TILE, 1, TILE);
    }
  }

  // Floor shine
  ctx.fillStyle = 'rgba(255,240,220,0.04)';
  ctx.fillRect(0, FLOOR_Y * TILE, canvas.width, 6);
}

// ============================================================
// DRAW FRAME (artwork on wall)
// ============================================================
function drawFrame(art) {
  const maxFrameH = 80;
  const aspect = (art.pw || 64) / (art.ph || 32);
  const frameH = maxFrameH;
  const frameW = Math.round(frameH * aspect);
  const frameX = art.wallX * TILE;
  const frameY = 5 * TILE;  // on the upper wall (more room now)

  const sx = Math.round(frameX - cameraX);
  const sy = frameY;

  if (sx + frameW + 20 < 0 || sx - 20 > canvas.width) return;

  // Tilt for day/night artworks — rotate everything together (frame + image)
  const isTilted = !!art.dayNight;
  if (isTilted) {
    ctx.save();
    ctx.imageSmoothingEnabled = false;
    const cx = sx + frameW / 2;
    const cy = sy + frameH / 2;
    ctx.translate(cx, cy);
    ctx.rotate(2 * Math.PI / 180);
    ctx.translate(-cx, -cy);
  }

  // Spotlight
  const spotCX = sx + frameW / 2;
  const spotTopY = 3 * TILE + 5;

  const spotGrad = ctx.createRadialGradient(spotCX, sy + frameH / 2, 10, spotCX, sy + frameH / 2, frameW * 1.2);
  spotGrad.addColorStop(0, 'rgba(255,240,200,0.12)');
  spotGrad.addColorStop(0.5, 'rgba(255,235,190,0.05)');
  spotGrad.addColorStop(1, 'rgba(255,230,180,0)');
  ctx.fillStyle = spotGrad;
  ctx.fillRect(spotCX - frameW * 1.2, sy - 20, frameW * 2.4, frameH + 60);

  // Light cone
  ctx.fillStyle = 'rgba(255,245,210,0.04)';
  ctx.beginPath();
  ctx.moveTo(spotCX - 6, spotTopY);
  ctx.lineTo(sx - 12, sy + frameH + 20);
  ctx.lineTo(sx + frameW + 12, sy + frameH + 20);
  ctx.lineTo(spotCX + 6, spotTopY);
  ctx.fill();

  // Frame shadow
  drawRectAbs(sx + 5, sy + 5, frameW + 16, frameH + 16, 'rgba(0,0,0,0.15)');

  // Frame
  drawRectAbs(sx - 10, sy - 10, frameW + 20, frameH + 20, C.frameDark);
  drawRectAbs(sx - 8, sy - 8, frameW + 16, frameH + 16, C.frameGold);
  drawRectAbs(sx - 8, sy - 8, frameW + 16, 2, C.frameLight);
  drawRectAbs(sx - 8, sy - 8, 2, frameH + 16, C.frameLight);
  drawRectAbs(sx - 8, sy + frameH + 6, frameW + 16, 2, C.frameDark);
  drawRectAbs(sx + frameW + 6, sy - 8, 2, frameH + 16, C.frameDark);
  drawRectAbs(sx - 4, sy - 4, frameW + 8, frameH + 8, '#e8dcc8');
  drawRectAbs(sx - 2, sy - 2, frameW + 4, frameH + 4, '#f8f4ec');
  drawRectAbs(sx, sy, frameW, frameH, '#2a2235');

  // Image — use night variant if available and it's nighttime
  const night = art.dayNight && isNightInBeijing();
  const img = night && artNightImages[art.id] ? artNightImages[art.id] : artImages[art.id];
  if (img && img.complete) {
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(img, sx, sy, frameW, frameH);
  }

  // Spotlight fixture (attached to ceiling, stays straight)
  drawRectAbs(spotCX - 4, spotTopY - 6, 8, 6, '#4a4058');
  drawRectAbs(spotCX - 6, spotTopY, 12, 4, '#5a5068');
  drawRectAbs(spotCX - 3, spotTopY + 4, 6, 3, C.lampGold);
  ctx.fillStyle = 'rgba(255,240,200,0.3)';
  ctx.fillRect(spotCX - 2, spotTopY + 7, 4, 2);

  // End tilt rotation — nameplate and rope stay straight
  if (isTilted) ctx.restore();

  // Info plate — small, just the title (like a museum nameplate)
  const displayTitle = night ? (tArt(art.id, 'nightTitle') || tArt(art.id, 'title')) : tArt(art.id, 'title');
  ctx.font = '10px monospace';
  const tw = ctx.measureText(displayTitle).width;
  const plateW = Math.max(60, Math.round(tw) + 16);
  const plateH = 18;
  const plateX = sx + frameW / 2 - plateW / 2;
  const plateY = sy + frameH + 20;
  // Shadow
  drawRectAbs(plateX + 1, plateY + 1, plateW, plateH, 'rgba(0,0,0,0.08)');
  // Plate body
  drawRectAbs(plateX, plateY, plateW, plateH, '#f0ece4');
  // Gold top edge
  drawRectAbs(plateX, plateY, plateW, 2, C.frameGold);
  // Title text
  ctx.fillStyle = '#3a2e20';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(displayTitle, plateX + plateW / 2, plateY + 13);
  ctx.textAlign = 'left';

  // Rope barrier — positioned against the wall (row 12), NOT on the floor
  const ropeY = (FLOOR_Y - 1) * TILE + 12; // just above floor on the wall
  const poleL = frameX - 16;
  const poleR = frameX + frameW + 16;

  // Left pole
  drawRect(poleL, ropeY - 24, 5, 32, '#6b5530');
  drawRect(poleL + 1, ropeY - 24, 3, 32, C.ropePole);
  drawRect(poleL + 1, ropeY - 24, 1, 32, C.frameLight);
  drawRect(poleL - 1, ropeY - 28, 7, 5, C.frameGold);
  drawRect(poleL, ropeY - 29, 5, 1, C.frameLight);
  // Right pole
  drawRect(poleR, ropeY - 24, 5, 32, '#6b5530');
  drawRect(poleR + 1, ropeY - 24, 3, 32, C.ropePole);
  drawRect(poleR + 1, ropeY - 24, 1, 32, C.frameLight);
  drawRect(poleR - 1, ropeY - 28, 7, 5, C.frameGold);
  drawRect(poleR, ropeY - 29, 5, 1, C.frameLight);

  // Velvet rope
  const ropeLx = poleL + 2 - cameraX;
  const ropeRx = poleR + 2 - cameraX;
  ctx.strokeStyle = 'rgba(0,0,0,0.2)';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(Math.round(ropeLx) + 2, ropeY - 16);
  ctx.quadraticCurveTo((ropeLx + ropeRx) / 2, ropeY - 4, Math.round(ropeRx) + 2, ropeY - 16);
  ctx.stroke();
  ctx.strokeStyle = '#b8375a';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(Math.round(ropeLx) + 2, ropeY - 18);
  ctx.quadraticCurveTo((ropeLx + ropeRx) / 2, ropeY - 6, Math.round(ropeRx) + 2, ropeY - 18);
  ctx.stroke();
  ctx.strokeStyle = '#d45a78';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(Math.round(ropeLx) + 2, ropeY - 19);
  ctx.quadraticCurveTo((ropeLx + ropeRx) / 2, ropeY - 7, Math.round(ropeRx) + 2, ropeY - 19);
  ctx.stroke();
}

// ============================================================
// DECORATIONS (plants on wall side, benches on floor)
// ============================================================
function drawPlant(tx) {
  const px = tx * TILE - cameraX;
  // Plants sit against the wall, at the wall-floor boundary
  const py = FLOOR_Y * TILE - 48;
  if (px < -40 || px > canvas.width + 40) return;

  // Ceramic pot
  drawRectAbs(Math.round(px) - 2, py + 32, 24, 16, '#6a5040');
  drawRectAbs(Math.round(px), py + 30, 20, 4, '#8a6a50');
  drawRectAbs(Math.round(px) + 2, py + 28, 16, 3, '#9a7a60');
  drawRectAbs(Math.round(px), py + 30, 20, 1, '#a88a68');
  drawRectAbs(Math.round(px) + 3, py + 28, 14, 2, '#4a3a28');

  // Leaves
  const g1 = '#5a8a4a', g2 = '#4a7a3a', g3 = '#6a9a5a', g4 = '#3a6a2a';
  drawRectAbs(Math.round(px) + 6, py + 12, 8, 16, g1);
  drawRectAbs(Math.round(px) + 2, py + 8, 6, 14, g2);
  drawRectAbs(Math.round(px) + 12, py + 6, 6, 16, g3);
  drawRectAbs(Math.round(px) + 8, py + 2, 4, 10, g1);
  drawRectAbs(Math.round(px), py + 14, 4, 8, g4);
  drawRectAbs(Math.round(px) + 14, py + 10, 4, 8, g2);
  drawRectAbs(Math.round(px) + 3, py + 9, 2, 2, g3);
  drawRectAbs(Math.round(px) + 13, py + 7, 2, 2, '#7aaa6a');
}

function drawBench(tx) {
  const px = tx * TILE - cameraX;
  const py = BENCH_Y; // use the shared constant
  if (px < -120 || px > canvas.width + 120) return;

  const bw = 96, bh = 16;

  // Metal legs
  drawRectAbs(Math.round(px) + 6, py + bh, 4, 18, '#5a5a5a');
  drawRectAbs(Math.round(px) + bw - 10, py + bh, 4, 18, '#5a5a5a');
  drawRectAbs(Math.round(px) + 7, py + bh, 2, 18, '#7a7a7a');
  drawRectAbs(Math.round(px) + bw - 9, py + bh, 2, 18, '#7a7a7a');
  // Feet
  drawRectAbs(Math.round(px) + 3, py + bh + 16, 10, 3, '#4a4a4a');
  drawRectAbs(Math.round(px) + bw - 13, py + bh + 16, 10, 3, '#4a4a4a');

  // Seat
  drawRectAbs(Math.round(px), py, bw, bh, '#3a3028');
  drawRectAbs(Math.round(px) + 1, py + 1, bw - 2, bh - 2, '#5a4838');
  drawRectAbs(Math.round(px) + 2, py + 1, bw - 4, 3, '#6a5848');
  // Center divide
  drawRectAbs(Math.round(px) + bw / 2 - 1, py + 1, 2, bh - 2, '#4a3828');
  // Highlight
  drawRectAbs(Math.round(px) + 2, py + 1, bw - 4, 1, '#7a6858');
}

function drawWelcomeSign() {
  const signX = 1 * TILE - cameraX;
  if (signX > -120 && signX < canvas.width + 120) {
    // Wider sign for visitor welcome
    const signW = isVisitorMode ? 120 : 88;
    drawRectAbs(Math.round(signX), 6 * TILE + 8, signW, 48, '#2a2235');
    drawRectAbs(Math.round(signX) - 2, 6 * TILE + 6, signW + 4, 2, C.frameGold);
    drawRectAbs(Math.round(signX) - 2, 6 * TILE + 54, signW + 4, 2, C.frameGold);
    drawRectAbs(Math.round(signX) - 2, 6 * TILE + 6, 2, 50, C.frameGold);
    drawRectAbs(Math.round(signX) + signW, 6 * TILE + 6, 2, 50, C.frameGold);
    ctx.fillStyle = '#f5e6d0';
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'center';
    if (isVisitorMode) {
      const ch = characters[currentChar];
      const name = currentLang === 'ja' ? ch.name_ja : (currentLang === 'zh' ? ch.name_zh : ch.name_en);
      const welcomeText = t('welcomeVisitor') || 'Welcome!';
      ctx.fillText(welcomeText.replace('{name}', name), Math.round(signX) + signW/2, 6 * TILE + 28);
    } else {
      ctx.fillText(t('welcome'), Math.round(signX) + signW/2, 6 * TILE + 28);
    }
    ctx.font = '10px monospace';
    ctx.fillStyle = '#c9a96e';
    ctx.fillText(t('galleryName'), Math.round(signX) + signW/2, 6 * TILE + 44);
    ctx.textAlign = 'left';
  }
}

// ============================================================
// DRAW PLAYER (supports both characters!)
// ============================================================
function drawPlayer() {
  const ch = characters[currentChar];
  const px = Math.round(player.x - cameraX);
  const py = Math.round(player.y);
  const f = player.facing;
  const S = 3;

  // === SITTING POSE ===
  if (isSitting) {
    // Compact sitting cat — body is a rounded blob, legs hidden, tail to side
    const bw = 12*S, bh = 6*S;
    const bx = px + 1*S;
    const by = py + 10*S;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(bx - 1*S, by + bh, bw + 2*S, 2*S);

    // Tail (curled to the side)
    ctx.fillStyle = ch.body;
    ctx.fillRect(bx + bw, by + 2*S, 4*S, 2*S);
    ctx.fillRect(bx + bw + 3*S, by + 1*S, 2*S, 2*S);
    if (ch.hasStar) {
      ctx.fillStyle = ch.starColor;
      ctx.fillRect(bx + bw + 4*S, by, 2*S, 2*S);
    }

    // Body (round sitting blob)
    ctx.fillStyle = ch.body;
    ctx.fillRect(bx, by, bw, bh);
    ctx.fillRect(bx - 1*S, by + 1*S, bw + 2*S, bh - 2*S);
    ctx.fillStyle = ch.belly;
    ctx.fillRect(bx + 3*S, by + 2*S, 6*S, bh - 2*S);

    // Front paws (visible, resting)
    ctx.fillStyle = ch.body;
    ctx.fillRect(bx + 1*S, by + bh, 3*S, 2*S);
    ctx.fillRect(bx + bw - 4*S, by + bh, 3*S, 2*S);
    ctx.fillStyle = ch.belly;
    ctx.fillRect(bx + 1*S, by + bh + 1*S, 3*S, 1*S);
    ctx.fillRect(bx + bw - 4*S, by + bh + 1*S, 3*S, 1*S);

    // Head (facing forward)
    const hx = bx + 1*S;
    const hy = by - 8*S;
    const hw = 10*S, hh = 9*S;
    ctx.fillStyle = ch.body;
    ctx.fillRect(hx, hy, hw, hh);
    ctx.fillStyle = ch.belly;
    ctx.fillRect(hx + 2*S, hy + 4*S, 6*S, 4*S);

    // Ears
    ctx.fillStyle = ch.body;
    ctx.fillRect(hx, hy - 3*S, 3*S, 3*S);
    ctx.fillRect(hx + hw - 3*S, hy - 3*S, 3*S, 3*S);
    ctx.fillStyle = ch.pink;
    ctx.fillRect(hx + 1*S, hy - 2*S, 1*S, 2*S);
    ctx.fillRect(hx + hw - 2*S, hy - 2*S, 1*S, 2*S);

    // Star (ほしねこ)
    if (ch.hasStar) {
      ctx.fillStyle = ch.starColor;
      const starX = hx + 4*S;
      const starY = hy + 1*S;
      ctx.fillRect(starX, starY, 2*S, 2*S);
      ctx.fillRect(starX - 1*S, starY + 1*S, 1*S, 1*S);
      ctx.fillRect(starX + 2*S, starY + 1*S, 1*S, 1*S);
      ctx.fillRect(starX, starY - 1*S, 1*S, 1*S);
      ctx.fillRect(starX + 1*S, starY + 2*S, 1*S, 1*S);
    }

    // Stripes (curry cat)
    if (ch.hasStripes) {
      ctx.fillStyle = ch.bodyDark;
      ctx.fillRect(hx + 2*S, hy + 1*S, 2*S, 1*S);
      ctx.fillRect(hx + hw - 4*S, hy + 1*S, 2*S, 1*S);
    }

    // Eyes (closed, relaxed — ˘‿˘ style)
    ctx.fillStyle = ch.eye;
    const eyeL = hx + 2*S, eyeR = hx + hw - 4*S;
    // Closed eye lines — gentle curves
    ctx.fillRect(eyeL, hy + 4*S, 2*S, 1*S);
    ctx.fillRect(eyeR, hy + 4*S, 2*S, 1*S);

    // Nose
    ctx.fillStyle = ch.pink;
    ctx.fillRect(hx + 4*S, hy + 5*S, 2*S, 1*S);

    // Cheeks
    ctx.fillStyle = 'rgba(240,140,150,0.5)';
    ctx.fillRect(hx + 1*S, hy + 5*S, 2*S, 1*S);
    ctx.fillRect(hx + hw - 3*S, hy + 5*S, 2*S, 1*S);

    // Glasses (sitting)
    if (ch.hasGlasses) {
      ctx.fillStyle = ch.glassesColor;
      // Left lens frame
      ctx.fillRect(hx + 1*S, hy + 3*S, 4*S, 1*S);
      ctx.fillRect(hx + 1*S, hy + 5*S, 4*S, 1*S);
      ctx.fillRect(hx + 1*S, hy + 3*S, 1*S, 3*S);
      ctx.fillRect(hx + 4*S, hy + 3*S, 1*S, 3*S);
      // Right lens frame
      ctx.fillRect(hx + hw - 5*S, hy + 3*S, 4*S, 1*S);
      ctx.fillRect(hx + hw - 5*S, hy + 5*S, 4*S, 1*S);
      ctx.fillRect(hx + hw - 5*S, hy + 3*S, 1*S, 3*S);
      ctx.fillRect(hx + hw - 2*S, hy + 3*S, 1*S, 3*S);
      // Bridge
      ctx.fillRect(hx + 4*S, hy + 4*S, hw - 9*S, 1*S);
      // Lens tint
      ctx.fillStyle = ch.glassesLens;
      ctx.fillRect(hx + 2*S, hy + 4*S, 2*S, 1*S);
      ctx.fillRect(hx + hw - 4*S, hy + 4*S, 2*S, 1*S);
    }

    // Eyelashes (sitting — eyes are closed, so lashes on the closed eye line)
    if (ch.hasLashes) {
      ctx.fillStyle = ch.lashColor;
      const eyeL = hx + 2*S, eyeR = hx + hw - 4*S;
      // Lash lines on top of closed eyes
      ctx.fillRect(eyeL - 1*S, hy + 3*S, 1*S, 1*S);
      ctx.fillRect(eyeR + 2*S, hy + 3*S, 1*S, 1*S);
      // Flick upward at outer corners
      ctx.fillRect(eyeL - 1*S, hy + 2*S, 1*S, 1*S);
      ctx.fillRect(eyeR + 2*S, hy + 2*S, 1*S, 1*S);
    }

    return; // skip normal drawing
  }

  // === NORMAL WALKING POSE ===

  const bw = 12*S, bh = 10*S;
  const bx = px + 1*S;
  const by = py + 8*S;

  // Animation
  player.walkTimer++;
  if (Math.abs(player.vx) > 0.1 || Math.abs(player.vy) > 0.1) {
    if (player.walkTimer % 8 === 0) player.walkFrame = (player.walkFrame + 1) % 4;
  } else {
    player.walkFrame = 0;
  }
  player.tailWag += 0.08;
  player.blinkTimer++;
  if (player.blinkTimer > 120) {
    player.isBlinking = true;
    if (player.blinkTimer > 126) { player.isBlinking = false; player.blinkTimer = 0; }
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(px, py + player.h - S, player.w, 2*S);

  // Tail
  const tailX = f === 1 ? bx - 3*S : bx + bw + 1*S;
  const tailWave = Math.sin(player.tailWag) * 2*S;
  ctx.fillStyle = ch.body;
  ctx.fillRect(tailX, by + 2*S + tailWave, 3*S, 2*S);
  ctx.fillRect(tailX + (f === 1 ? -1*S : 1*S), by + tailWave, 2*S, 3*S);
  ctx.fillStyle = ch.bodyDark;
  ctx.fillRect(tailX, by + 3*S + tailWave, 3*S, 1*S);

  // Star on tail tip (ほしねこ)
  if (ch.hasStar) {
    ctx.fillStyle = ch.starColor;
    const starTX = tailX + (f === 1 ? -1*S : 1*S);
    ctx.fillRect(starTX, by + tailWave - 1*S, 2*S, 2*S);
    ctx.fillRect(starTX - 1*S, by + tailWave, 1*S, 1*S);
    ctx.fillRect(starTX + 2*S, by + tailWave, 1*S, 1*S);
  }

  // Body
  ctx.fillStyle = ch.body;
  ctx.fillRect(bx, by, bw, bh);
  ctx.fillStyle = ch.belly;
  ctx.fillRect(bx + 3*S, by + 4*S, 6*S, bh - 4*S);

  // Stripes (curry cat only)
  if (ch.hasStripes) {
    ctx.fillStyle = ch.bodyDark;
    ctx.fillRect(bx + 2*S, by + 1*S, 2*S, 1*S);
    ctx.fillRect(bx + 6*S, by + 1*S, 2*S, 1*S);
    ctx.fillRect(bx + 8*S, by + 2*S, 2*S, 1*S);
  }

  // Legs
  const legOff = [0, -1*S, 0, 1*S][player.walkFrame];
  ctx.fillStyle = ch.body;
  ctx.fillRect(bx + (f === 1 ? 8*S : 1*S), by + bh, 2*S, 3*S + legOff);
  ctx.fillRect(bx + (f === 1 ? 10*S : 3*S), by + bh, 2*S, 3*S - legOff);
  ctx.fillRect(bx + (f === 1 ? 1*S : 8*S), by + bh, 2*S, 3*S - legOff);
  ctx.fillRect(bx + (f === 1 ? 3*S : 10*S), by + bh, 2*S, 3*S + legOff);
  ctx.fillStyle = ch.belly;
  ctx.fillRect(bx + (f === 1 ? 8*S : 1*S), by + bh + 2*S + legOff, 2*S, 1*S);
  ctx.fillRect(bx + (f === 1 ? 1*S : 8*S), by + bh + 2*S - legOff, 2*S, 1*S);

  // Head
  const hx = bx + (f === 1 ? 2*S : 0);
  const hy = by - 8*S;
  const hw = 10*S, hh = 9*S;
  ctx.fillStyle = ch.body;
  ctx.fillRect(hx, hy, hw, hh);
  ctx.fillStyle = ch.belly;
  ctx.fillRect(hx + 2*S, hy + 4*S, 6*S, 4*S);

  // Ears
  ctx.fillStyle = ch.body;
  ctx.fillRect(hx, hy - 3*S, 3*S, 3*S);
  ctx.fillRect(hx + hw - 3*S, hy - 3*S, 3*S, 3*S);
  ctx.fillStyle = ch.pink;
  ctx.fillRect(hx + 1*S, hy - 2*S, 1*S, 2*S);
  ctx.fillRect(hx + hw - 2*S, hy - 2*S, 1*S, 2*S);

  // Star on forehead (ほしねこ)
  if (ch.hasStar) {
    ctx.fillStyle = ch.starColor;
    const starX = hx + 4*S;
    const starY = hy + 1*S;
    ctx.fillRect(starX, starY, 2*S, 2*S);
    ctx.fillRect(starX - 1*S, starY + 1*S, 1*S, 1*S);
    ctx.fillRect(starX + 2*S, starY + 1*S, 1*S, 1*S);
    ctx.fillRect(starX + 0*S, starY - 1*S, 1*S, 1*S);
    ctx.fillRect(starX + 1*S, starY + 2*S, 1*S, 1*S);
  }

  // Eyes
  if (!player.isBlinking) {
    const eyeL = f === 1 ? hx + 2*S : hx + hw - 4*S;
    const eyeR = f === 1 ? hx + 6*S : hx + hw - 8*S;
    ctx.fillStyle = ch.eye;
    ctx.fillRect(eyeL, hy + 3*S, 2*S, 2*S);
    ctx.fillRect(eyeR, hy + 3*S, 2*S, 2*S);
    ctx.fillStyle = '#fff';
    ctx.fillRect(eyeL + 1*S, hy + 3*S, 1*S, 1*S);
    ctx.fillRect(eyeR + 1*S, hy + 3*S, 1*S, 1*S);
  } else {
    const eyeL = f === 1 ? hx + 2*S : hx + hw - 4*S;
    const eyeR = f === 1 ? hx + 6*S : hx + hw - 8*S;
    ctx.fillStyle = ch.eye;
    ctx.fillRect(eyeL, hy + 4*S, 2*S, 1*S);
    ctx.fillRect(eyeR, hy + 4*S, 2*S, 1*S);
  }

  // Nose
  ctx.fillStyle = ch.pink;
  const noseX = hx + (f === 1 ? 5*S : hw - 6*S);
  ctx.fillRect(noseX, hy + 5*S, 1*S, 1*S);

  // Cheeks
  ctx.fillStyle = 'rgba(240,140,150,0.5)';
  ctx.fillRect(hx + 1*S, hy + 5*S, 2*S, 1*S);
  ctx.fillRect(hx + hw - 3*S, hy + 5*S, 2*S, 1*S);

  // Glasses (walking)
  if (ch.hasGlasses) {
    ctx.fillStyle = ch.glassesColor;
    const glF = f; // facing direction
    // Left lens frame (relative to face)
    const gl1X = hx + 1*S;
    const gl2X = hx + hw - 5*S;
    // Left lens
    ctx.fillRect(gl1X, hy + 2*S, 4*S, 1*S);
    ctx.fillRect(gl1X, hy + 5*S, 4*S, 1*S);
    ctx.fillRect(gl1X, hy + 2*S, 1*S, 4*S);
    ctx.fillRect(gl1X + 3*S, hy + 2*S, 1*S, 4*S);
    // Right lens
    ctx.fillRect(gl2X, hy + 2*S, 4*S, 1*S);
    ctx.fillRect(gl2X, hy + 5*S, 4*S, 1*S);
    ctx.fillRect(gl2X, hy + 2*S, 1*S, 4*S);
    ctx.fillRect(gl2X + 3*S, hy + 2*S, 1*S, 4*S);
    // Bridge
    ctx.fillRect(gl1X + 3*S, hy + 3*S, gl2X - gl1X - 2*S, 1*S);
    // Ear hooks (side temples)
    if (glF === 1) {
      ctx.fillRect(gl2X + 4*S, hy + 3*S, 1*S, 1*S);
    } else {
      ctx.fillRect(gl1X - 1*S, hy + 3*S, 1*S, 1*S);
    }
    // Lens tint
    ctx.fillStyle = ch.glassesLens;
    ctx.fillRect(gl1X + 1*S, hy + 3*S, 2*S, 2*S);
    ctx.fillRect(gl2X + 1*S, hy + 3*S, 2*S, 2*S);
  }

  // Eyelashes (walking)
  if (ch.hasLashes) {
    ctx.fillStyle = ch.lashColor;
    if (!player.isBlinking) {
      // Open eyes — lash lines above each eye + flick at outer corner
      const eyeL = f === 1 ? hx + 2*S : hx + hw - 4*S;
      const eyeR = f === 1 ? hx + 6*S : hx + hw - 8*S;
      // Top lash line
      ctx.fillRect(eyeL, hy + 2*S, 2*S, 1*S);
      ctx.fillRect(eyeR, hy + 2*S, 2*S, 1*S);
      // Flicked tips (outer corners go up)
      const outerL = f === 1 ? eyeL - 1*S : eyeL + 2*S;
      const outerR = f === 1 ? eyeR + 2*S : eyeR - 1*S;
      ctx.fillRect(outerL, hy + 2*S, 1*S, 1*S);
      ctx.fillRect(outerL, hy + 1*S, 1*S, 1*S);
      ctx.fillRect(outerR, hy + 2*S, 1*S, 1*S);
      ctx.fillRect(outerR, hy + 1*S, 1*S, 1*S);
    } else {
      // Blinking — small lash flicks at outer corners of closed eyes
      const eyeL = f === 1 ? hx + 2*S : hx + hw - 4*S;
      const eyeR = f === 1 ? hx + 6*S : hx + hw - 8*S;
      const outerL = f === 1 ? eyeL - 1*S : eyeL + 2*S;
      const outerR = f === 1 ? eyeR + 2*S : eyeR - 1*S;
      ctx.fillRect(outerL, hy + 3*S, 1*S, 1*S);
      ctx.fillRect(outerR, hy + 3*S, 1*S, 1*S);
    }
  }
}

// ============================================================
// GAME LOGIC
// ============================================================
function update() {
  const modalOpen = document.getElementById('modal-bg').style.display === 'flex';
  if (modalOpen) return;

  // ============================================================
  // VISITOR AUTO-WALK MODE
  // ============================================================
  if (isVisitorMode) {
    updateVisitorMode();
    return;
  }

  // If sitting, freeze player movement — only allow standing up
  if (isSitting) {
    player.vx = 0;
    player.vy = 0;
    // Keep sitting position
    if (sitBenchIdx >= 0) {
      const btx = benchPositions[sitBenchIdx];
      player.x = btx * TILE + BENCH_W / 2 - player.w / 2;
      player.y = BENCH_Y - player.h + 12;
    }
    // Any directional input = stand up
    let moveX = 0, moveY = 0;
    if (keys['ArrowLeft'] || keys['a'] || keys['A'] || mobileLeft) moveX -= 1;
    if (keys['ArrowRight'] || keys['d'] || keys['D'] || mobileRight) moveX += 1;
    if (keys['ArrowUp'] || keys['w'] || keys['W'] || mobileUp) moveY -= 1;
    if (keys['ArrowDown'] || keys['s'] || keys['S'] || mobileDown) moveY += 1;
    if (moveX !== 0 || moveY !== 0) {
      isSitting = false;
      sitBenchIdx = -1;
      // Push player below bench legs so they're not stuck inside
      player.y = BENCH_Y - 12; // foot=560
    }

    // Camera still follows
    const targetCam = player.x - canvas.width / 2 + player.w / 2;
    cameraX += (targetCam - cameraX) * 0.1;
    if (cameraX < 0) cameraX = 0;
    if (cameraX > GALLERY_W - canvas.width) cameraX = GALLERY_W - canvas.width;
    if (GALLERY_W <= canvas.width) cameraX = 0;

    // Show "stand up" prompt
    nearArtwork = null;
    nearBench = null;
    const prompt = document.getElementById('interact-prompt');
    const btnInteract = document.getElementById('btn-interact');
    prompt.textContent = t('promptStand');
    prompt.style.display = 'block';
    if (btnInteract) btnInteract.style.display = 'flex';
    updateInteractIcon('stand');
    return;
  }

  // 4-directional movement!
  let moveX = 0, moveY = 0;
  if (keys['ArrowLeft'] || keys['a'] || keys['A'] || mobileLeft) moveX -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D'] || mobileRight) moveX += 1;
  if (keys['ArrowUp'] || keys['w'] || keys['W'] || mobileUp) moveY -= 1;
  if (keys['ArrowDown'] || keys['s'] || keys['S'] || mobileDown) moveY += 1;

  // Normalize diagonal speed
  if (moveX !== 0 && moveY !== 0) {
    moveX *= 0.707;
    moveY *= 0.707;
  }

  const speed = isVisitorMode ? WALK_SPEED * 0.8 : WALK_SPEED;
  player.vx = moveX * speed;
  player.vy = moveY * speed;
  if (moveX !== 0) player.facing = moveX > 0 ? 1 : -1;

  // Tentative new position
  let newX = player.x + player.vx;
  let newY = player.y + player.vy;

  // World X bounds
  if (newX < 0) newX = 0;
  if (newX > GALLERY_W - player.w) newX = GALLERY_W - player.w;

  // Floor Y bounds — extended up to allow walking near rope/bench area
  const maxY = (FLOOR_BOTTOM + 1) * TILE - player.h; // bottom of floor
  if (newY > maxY) newY = maxY;

  // ── Floor top boundary ──
  // Cat's feet cannot go above the floor edge
  const floorTopY = FLOOR_Y * TILE;
  if (newY + player.h < floorTopY) {
    newY = floorTopY - player.h;
  }

  // ── Bench collision — cat can't walk through bench at all ──
  // Collision line = bottom of bench legs (full bench height)
  for (let i = 0; i < benchPositions.length; i++) {
    const bx = benchPositions[i] * TILE;
    const benchTop = BENCH_Y;                    // top of bench seat
    const benchBottom = BENCH_Y + BENCH_H + 18;  // bottom of bench legs

    // Check horizontal overlap with bench
    if (newX + player.w > bx - 4 && newX < bx + BENCH_W + 4) {
      const oldFoot = player.y + player.h;
      const newFoot = newY + player.h;

      // Case 1: Was above bench, trying to move feet below bench top → block (foot=520)
      if (oldFoot <= benchTop + 8 && newFoot > benchTop + 8) {
        newY = benchTop + 8 - player.h;
      }
      // Case 2: Was below bench legs, trying to move feet above bench bottom → block (foot=550)
      if (oldFoot >= benchBottom + 4 && newFoot < benchBottom + 4) {
        newY = benchBottom + 4 - player.h;
      }
    }
  }

  player.x = newX;
  player.y = newY;

  // Camera follow (X only)
  const targetCam = player.x - canvas.width / 2 + player.w / 2;
  cameraX += (targetCam - cameraX) * 0.1;
  if (cameraX < 0) cameraX = 0;
  if (cameraX > GALLERY_W - canvas.width) cameraX = GALLERY_W - canvas.width;
  if (GALLERY_W <= canvas.width) cameraX = 0;

  // Check proximity to artworks (X distance only, since artworks are on wall)
  nearArtwork = null;
  const playerCenter = player.x + player.w / 2;
  for (const art of artworks) {
    const artAspect = (art.pw || 64) / (art.ph || 32);
    const artFrameW = Math.round(80 * artAspect);
    const artCenter = art.wallX * TILE + artFrameW / 2;
    const dist = Math.abs(playerCenter - artCenter);
    // Only if player is near the top of the floor (close to the wall)
    if (dist < artFrameW / 2 + 40 && player.y < FLOOR_Y * TILE + 48) {
      nearArtwork = art;
      break;
    }
  }

  // Check proximity to benches (from above or below)
  nearBench = null;
  for (let i = 0; i < benchPositions.length; i++) {
    const br = getBenchRect(benchPositions[i]);
    const benchCenter = br.x + BENCH_W / 2;
    const distX = Math.abs(playerCenter - benchCenter);
    // Use player center Y for proximity
    const playerCenterY = player.y + player.h / 2;
    const benchCenterY = br.y + br.h / 2;
    const distY = Math.abs(playerCenterY - benchCenterY);
    if (distX < BENCH_W / 2 + 30 && distY < player.h + 20) {
      nearBench = i;
      break;
    }
  }

  // UI
  const prompt = document.getElementById('interact-prompt');
  const btnInteract = document.getElementById('btn-interact');
  if (nearArtwork) {
    prompt.textContent = t('promptView');
    prompt.style.display = 'block';
    if (btnInteract) btnInteract.style.display = 'flex';
    updateInteractIcon('eye');
  } else if (nearBench !== null) {
    prompt.textContent = t('promptSit');
    prompt.style.display = 'block';
    if (btnInteract) btnInteract.style.display = 'flex';
    updateInteractIcon('sit');
  } else {
    prompt.style.display = 'none';
    if (btnInteract) btnInteract.style.display = 'none';
  }

  // Floating reactions for visitors near artwork
  if (isVisitorMode && nearArtwork) {
    reactionTimer++;
    if (reactionTimer >= 180) { // ~3 seconds at 60fps
      reactionTimer = 0;
      spawnFloatingReaction();
    }
  } else {
    reactionTimer = 0;
  }
}

// ============================================================
// ============================================================
// VISITOR AUTO-WALK LOGIC
// ============================================================
function updateVisitorMode() {
  // Position player on the floor (near the wall, where artworks are visible)
  const floorTopY = FLOOR_Y * TILE;
  if (player.y === 0 || player.y < floorTopY - player.h) {
    player.y = floorTopY - player.h + 10; // slightly into floor area
  }

  if (tourState === 'walk') {
    // Determine target artwork
    const targetIdx = tourIndex + 1;
    if (targetIdx >= artworks.length) {
      // Tour complete!
      tourState = 'done';
      tourBubbleText = t('tourComplete');
      tourBubbleOpacity = 1;
      tourTimer = 0;
      player.vx = 0;
      return;
    }

    const targetArt = artworks[targetIdx];
    const artAspect = (targetArt.pw || 64) / (targetArt.ph || 32);
    const artFrameW = Math.round(80 * artAspect);
    const targetX = targetArt.wallX * TILE + artFrameW / 2 - player.w / 2;

    // Walk towards target
    const dx = targetX - player.x;
    if (Math.abs(dx) > 4) {
      player.vx = Math.sign(dx) * TOUR_WALK_SPEED;
      player.facing = dx > 0 ? 1 : -1;
      player.x += player.vx;

      // Spawn paw prints
      if (Math.abs(player.x - lastPawX) >= PAW_INTERVAL) {
        pawPrints.push({
          x: player.x + player.w / 2,
          y: player.y + player.h - 4,
          age: 0,
          maxAge: PAW_MAX_AGE
        });
        lastPawX = player.x;
      }
    } else {
      // Arrived at artwork
      player.vx = 0;
      tourIndex = targetIdx;
      tourState = 'viewing';
      tourTimer = 0;
      tourBubbleOpacity = 0;
      const artDesc = tArt(targetArt.id, 'desc');
      tourBubbleText = artDesc;
      // Decide if this artwork gets a heart
      tourShowHeart = Math.random() < 0.3;
      tourHeartSpawned = false;
    }
  } else if (tourState === 'viewing') {
    tourTimer++;

    // Fade in bubble
    if (tourBubbleOpacity < 1) {
      tourBubbleOpacity = Math.min(1, tourBubbleOpacity + 0.04);
    }

    // Spawn heart reaction partway through viewing
    if (tourShowHeart && !tourHeartSpawned && tourTimer > TOUR_VIEW_TIME * 0.5) {
      spawnFloatingReaction();
      tourHeartSpawned = true;
    }

    // Done viewing
    if (tourTimer >= TOUR_VIEW_TIME) {
      // Fade out bubble
      tourBubbleOpacity = Math.max(0, tourBubbleOpacity - 0.08);
      if (tourBubbleOpacity <= 0) {
        tourState = 'walk';
      }
    }
  } else if (tourState === 'done') {
    tourTimer++;
    // Show "tour complete" bubble for a bit, then fade
    if (tourTimer > 180) {
      tourBubbleOpacity = Math.max(0, tourBubbleOpacity - 0.02);
    }
  }

  // Update paw prints
  for (let i = pawPrints.length - 1; i >= 0; i--) {
    pawPrints[i].age++;
    if (pawPrints[i].age >= pawPrints[i].maxAge) {
      pawPrints.splice(i, 1);
    }
  }

  // Camera follow
  const targetCam = player.x - canvas.width / 2 + player.w / 2;
  cameraX += (targetCam - cameraX) * 0.08; // slightly smoother for tour
  if (cameraX < 0) cameraX = 0;
  if (cameraX > GALLERY_W - canvas.width) cameraX = GALLERY_W - canvas.width;
  if (GALLERY_W <= canvas.width) cameraX = 0;
}

// ============================================================
// DRAW SPEECH BUBBLE (visitor mode)
// ============================================================
function drawSpeechBubble() {
  if (!isVisitorMode || tourBubbleOpacity <= 0 || !tourBubbleText) return;

  ctx.save();
  ctx.globalAlpha = tourBubbleOpacity;

  const px = Math.round(player.x - cameraX + player.w / 2);
  const bubbleMaxW = 200;
  const lineH = 14;
  const padX = 10;
  const padY = 8;

  // Word wrap
  ctx.font = '10px monospace';
  const words = tourBubbleText.split('');
  const lines = [];
  let currentLine = '';

  for (const char of tourBubbleText) {
    if (char === '\n') {
      lines.push(currentLine);
      currentLine = '';
      continue;
    }
    const testLine = currentLine + char;
    const metrics = ctx.measureText(testLine);
    if (metrics.width > bubbleMaxW - padX * 2) {
      lines.push(currentLine);
      currentLine = char;
    } else {
      currentLine = testLine;
    }
  }
  if (currentLine) lines.push(currentLine);

  const bubbleW = Math.min(bubbleMaxW, Math.max(...lines.map(l => ctx.measureText(l).width)) + padX * 2 + 4);
  const bubbleH = lines.length * lineH + padY * 2;
  const bubbleX = Math.max(4, Math.min(canvas.width - bubbleW - 4, px - bubbleW / 2));
  const bubbleY = Math.round(player.y - bubbleH - 24);

  // Background
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(bubbleX, bubbleY, bubbleW, bubbleH);

  // Gold border
  ctx.strokeStyle = '#c9a96e';
  ctx.lineWidth = 2;
  ctx.strokeRect(bubbleX, bubbleY, bubbleW, bubbleH);

  // Tail (triangle pointing down)
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.beginPath();
  ctx.moveTo(px - 6, bubbleY + bubbleH);
  ctx.lineTo(px, bubbleY + bubbleH + 8);
  ctx.lineTo(px + 6, bubbleY + bubbleH);
  ctx.fill();
  // Tail border
  ctx.strokeStyle = '#c9a96e';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(px - 6, bubbleY + bubbleH);
  ctx.lineTo(px, bubbleY + bubbleH + 8);
  ctx.lineTo(px + 6, bubbleY + bubbleH);
  ctx.stroke();
  // Cover the tail-body intersection
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(px - 7, bubbleY + bubbleH - 2, 14, 3);

  // Text
  ctx.fillStyle = '#f5e6d0';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  for (let i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], bubbleX + padX, bubbleY + padY + (i + 1) * lineH - 2);
  }

  ctx.restore();
}

// ============================================================
// DRAW PAW PRINTS (visitor mode)
// ============================================================
function drawPawPrints() {
  if (pawPrints.length === 0) return;

  for (const paw of pawPrints) {
    const opacity = 1 - (paw.age / paw.maxAge);
    if (opacity <= 0) continue;

    ctx.save();
    ctx.globalAlpha = opacity * 0.4;
    const sx = Math.round(paw.x - cameraX);
    const sy = Math.round(paw.y);

    // Tiny paw print — 3 toe beans + 1 pad
    ctx.fillStyle = '#d7969f'; // pink, matching Moss's pink
    // Pad (main)
    ctx.fillRect(sx, sy + 2, 3, 2);
    // Toe beans
    ctx.fillRect(sx - 1, sy, 2, 2);
    ctx.fillRect(sx + 1, sy - 1, 2, 1);
    ctx.fillRect(sx + 3, sy, 2, 2);

    ctx.restore();
  }
}

// FLOATING REACTIONS (visitor mode)
// ============================================================
function spawnFloatingReaction() {
  const emojis = ['❤️', '✨', '🌟', '💚', '😍', '🎨'];
  const emoji = emojis[Math.floor(Math.random() * emojis.length)];
  const el = document.createElement('div');
  el.className = 'float-reaction';
  el.textContent = emoji;
  // Position above the player
  const rect = canvas.getBoundingClientRect();
  const scaleX = rect.width / canvas.width;
  const scaleY = rect.height / canvas.height;
  const px = (player.x - cameraX + player.w / 2) * scaleX + rect.left;
  const py = (player.y - 20) * scaleY + rect.top;
  el.style.left = (px + (Math.random() - 0.5) * 40) + 'px';
  el.style.top = py + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2000);
}

// ============================================================
// WELCOME SCREEN PREVIEW CATS
// ============================================================
function drawPreviewCat(canvasId, charDef, size) {
  const c = document.getElementById(canvasId);
  if (!c) return;
  const x = c.getContext('2d');
  x.imageSmoothingEnabled = false;
  x.clearRect(0, 0, c.width, c.height);
  const s = size || 2; // pixel scale
  // Use same 16x16 layout as drawCharIcon, scaled by s
  const ox = Math.floor((c.width - 16*s) / 2);
  const oy = Math.floor((c.height - 14*s) / 2);

  const bodyColor = charDef.body;
  const bellyColor = charDef.belly;
  const eyeColor = charDef.eye;
  const pinkColor = charDef.pink;

  function px(px, py) { x.fillRect(ox + px*s, oy + py*s, s, s); }
  function fill(coords) { coords.forEach(([a,b]) => px(a,b)); }

  // Ears
  x.fillStyle = bodyColor;
  fill([[3,1],[4,1],[11,1],[12,1],[2,2],[3,2],[4,2],[11,2],[12,2],[13,2]]);
  // Inner ears
  x.fillStyle = pinkColor;
  px(3, 2); px(12, 2);

  // Head
  x.fillStyle = bodyColor;
  for (let py = 3; py <= 9; py++)
    for (let ppx = 2; ppx <= 13; ppx++)
      px(ppx, py);

  // Muzzle
  x.fillStyle = bellyColor;
  for (let py = 6; py <= 9; py++)
    for (let ppx = 5; ppx <= 10; ppx++)
      px(ppx, py);

  // Eyes
  x.fillStyle = eyeColor;
  x.fillRect(ox + 4*s, oy + 5*s, 2*s, 2*s);
  x.fillRect(ox + 10*s, oy + 5*s, 2*s, 2*s);
  x.fillStyle = '#fff';
  px(5, 5); px(11, 5);

  // Nose
  x.fillStyle = pinkColor;
  x.fillRect(ox + 7*s, oy + 7*s, 2*s, s);

  // Cheeks
  x.fillStyle = 'rgba(240,140,150,0.6)';
  x.fillRect(ox + 3*s, oy + 7*s, 2*s, s);
  x.fillRect(ox + 11*s, oy + 7*s, 2*s, s);

  // Mouth
  x.fillStyle = eyeColor;
  px(7, 8); px(8, 8);

  // Star (ほしねこ)
  if (charDef.hasStar) {
    x.fillStyle = charDef.starColor;
    x.fillRect(ox + 7*s, oy + 3*s, 2*s, 2*s);
    px(6, 4); px(9, 4);
    px(7, 2); px(8, 5);
  }

  // Stripes (curry)
  if (charDef.hasStripes) {
    x.fillStyle = charDef.bodyDark;
    x.fillRect(ox + 4*s, oy + 3*s, 2*s, s);
    x.fillRect(ox + 10*s, oy + 3*s, 2*s, s);
    px(3, 4); px(12, 4);
  }

  // Glasses
  if (charDef.hasGlasses) {
    x.fillStyle = charDef.glassesColor;
    // Left lens
    x.fillRect(ox + 3*s, oy + 4*s, 4*s, s);
    x.fillRect(ox + 3*s, oy + 7*s, 4*s, s);
    x.fillRect(ox + 3*s, oy + 4*s, s, 4*s);
    x.fillRect(ox + 6*s, oy + 4*s, s, 4*s);
    // Right lens
    x.fillRect(ox + 9*s, oy + 4*s, 4*s, s);
    x.fillRect(ox + 9*s, oy + 7*s, 4*s, s);
    x.fillRect(ox + 9*s, oy + 4*s, s, 4*s);
    x.fillRect(ox + 12*s, oy + 4*s, s, 4*s);
    // Bridge
    x.fillRect(ox + 6*s, oy + 5*s, 3*s, s);
    // Lens tint
    x.fillStyle = charDef.glassesLens;
    x.fillRect(ox + 4*s, oy + 5*s, 2*s, 2*s);
    x.fillRect(ox + 10*s, oy + 5*s, 2*s, 2*s);
  }

  // Eyelashes (preview)
  if (charDef.hasLashes) {
    x.fillStyle = charDef.lashColor;
    // Top lash lines above eyes
    x.fillRect(ox + 4*s, oy + 4*s, 2*s, s);
    x.fillRect(ox + 10*s, oy + 4*s, 2*s, s);
    // Flicked tips at outer corners
    px(3, 4); px(3, 3);
    px(12, 4); px(12, 3);
  }

  // Body
  x.fillStyle = bodyColor;
  for (let ppx = 3; ppx <= 12; ppx++) {
    px(ppx, 10); px(ppx, 11);
  }
  x.fillStyle = bellyColor;
  for (let ppx = 5; ppx <= 10; ppx++)
    px(ppx, 11);

  // Paws
  x.fillStyle = bodyColor;
  x.fillRect(ox + 3*s, oy + 12*s, 2*s, s);
  px(5, 12);
  px(10, 12);
  x.fillRect(ox + 11*s, oy + 12*s, 2*s, s);
}

function drawAllPreviews() {
  drawPreviewCat('preview-curry', characters.curry, 2);
  drawPreviewCat('preview-hoshi', characters.hoshi, 2);
  drawPreviewCat('preview-moss', characters.moss, 2);
  drawPreviewCat('card-moss', characters.moss, 3);
}

// ============================================================
// RENDER
// ============================================================
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.imageSmoothingEnabled = false;

  drawGallery();

  // Draw frames on wall (always behind everything on the floor)
  for (const art of artworks) {
    drawFrame(art);
  }

  // Y-sorted rendering: player, benches, and plants are sorted by their "foot" Y position
  // Objects with lower Y (higher on screen) are drawn first (behind)
  const playerFootY = player.y + player.h;

  // Draw plants against wall (they're at FLOOR_Y boundary, always behind floor objects)
  drawPlant(3);
  drawPlant(12);
  drawPlant(22);
  drawPlant(32);
  drawPlant(42);
  drawPlant(52);
  drawPlant(62);
  drawPlant(72);
  drawPlant(82);
  drawPlant(92);

  // Welcome sign (on wall, always behind)
  drawWelcomeSign();

  // Collect floor objects for Y-sort: benches + player
  const floorObjects = [];
  // Add benches
  for (let i = 0; i < benchPositions.length; i++) {
    const btx = benchPositions[i];
    floorObjects.push({
      type: 'bench',
      tx: btx,
      sortY: BENCH_Y + BENCH_H + 18 // foot of bench (bottom of legs)
    });
  }
  // Add player
  floorObjects.push({
    type: 'player',
    sortY: playerFootY
  });

  // Sort by Y (lower Y = drawn first = behind)
  floorObjects.sort((a, b) => a.sortY - b.sortY);

  // Draw in order
  for (const obj of floorObjects) {
    if (obj.type === 'bench') drawBench(obj.tx);
    else if (obj.type === 'player') drawPlayer();
  }

  // Visitor mode overlays (drawn on top of everything)
  if (isVisitorMode) {
    drawPawPrints();
    drawSpeechBubble();
  }
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}
